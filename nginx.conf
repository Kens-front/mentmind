events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name mentmind.ru;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }
    
    server {
        listen 443 ssl http2;
        server_name mentmind.ru;  # 🔹 Замените на ваш домен

        # 🔹 Пути к сертификатам
        ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;

        # 🔹 Безопасные SSL-настройки
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # 🔹 Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        
        location /socket.io/ {
            proxy_pass http://nest:5000;
            proxy_http_version 1.1;
            
            # 🔑 Заголовки для WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Стандартные прокси-заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Таймауты для долгоживущих соединений
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            # Отключаем буферизацию
            proxy_buffering off;
        }
    
        # === Vue 3 (Статика) ===
        # 1. Сначала редирект: /dashboard → /dashboard/
        location = /dashboard {
            return 301 /dashboard/;
        }
    
        # 2. Основной обработчик: /dashboard/...
        location /dashboard/ {
            alias /usr/share/nginx/html/vue/;
            index index.html;
            # ✅ Fallback должен соответствовать URL, а не пути на диске
            try_files $uri $uri/ /dashboard/index.html;
            
            
             location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
                
            # 🔥 index.html никогда не кэшировать!
            location = /dashboard/index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }
    
        # === NestJS API ===
        # ⚠️ Должен идти ПЕРЕДЕ location /
        location /api/ {
            proxy_pass http://nest:5000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cookie_path / /;
        }
    
        # === Nuxt 3 (Основной сайт) ===
        # ⚠️ Должен быть ПОСЛЕДНИМ (catch-all)
        location / {
            proxy_pass http://nuxt:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_buffering off;
        }
    }
}